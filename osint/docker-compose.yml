services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/osint-raw;
      mc mb --ignore-existing local/osint-tiles;
      exit 0;
      "

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      MB_ANON_TRACKING_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    volumes:
      - metabase-data:/metabase-data

  # Auto-configure Metabase on first boot (creates admin + connects DB)
  metabase-setup:
    image: curlimages/curl:latest
    depends_on:
      metabase:
        condition: service_healthy
    volumes:
      - ./scripts/metabase-setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]

volumes:
  redis-data:
  minio-data:
  metabase-data:
