server {
  host = "0.0.0.0"
  host = ${?PHAROS_ENGINE_HOST}
  port = 4100
  port = ${?PHAROS_ENGINE_PORT}
}

db {
  host     = "localhost"
  host     = ${?PHAROS_DB_HOST}
  port     = 5434
  port     = ${?PHAROS_DB_PORT}
  name     = "pharos"
  name     = ${?PHAROS_DB_NAME}
  user     = "pharos"
  user     = ${?PHAROS_DB_USER}
  password = "pharos"
  password = ${?PHAROS_DB_PASSWORD}
}

engine {
  correlation-window-minutes = 120
  similarity-threshold       = 0.35
  feed-poll-interval-seconds = 300
  max-concurrent-feeds       = 8
  threat-decay-hours         = 24
}
